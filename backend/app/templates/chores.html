{% extends "base.html" %}

{% block title %}Chore List | Choremarket{% endblock %}

{% block content %}
<section class="section">
  <div class="section-heading">
    <h1>Chore List</h1>
    <p>Tasks and frequencies</p>
  </div>

  <form class="toolbar grid-3" action="/chores" method="post">
    <label>
      <span>Task</span>
      <input name="name" type="text" required autocomplete="off">
    </label>
    <label>
      <span>Frequency</span>
      <input name="frequency" type="text" value="Weekly" required autocomplete="off">
    </label>
    <label>
      <span>Description</span>
      <input name="description" type="text" autocomplete="off">
    </label>
    <button type="submit">Add Chore</button>
  </form>

  {% for chore in chores %}
    <form id="edit-chore-{{ chore.id }}" action="/chores/{{ chore.id }}/edit" method="post"></form>
  {% endfor %}

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Task</th>
          <th>Frequency</th>
          <th>Description</th>
          <th class="actions">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for chore in chores %}
        <tr>
          <td>
            <input form="edit-chore-{{ chore.id }}" name="name" type="text" value="{{ chore.name }}" required autocomplete="off">
          </td>
          <td>
            <input form="edit-chore-{{ chore.id }}" name="frequency" type="text" value="{{ chore.frequency }}" required autocomplete="off">
          </td>
          <td>
            <input form="edit-chore-{{ chore.id }}" name="description" type="text" value="{{ chore.description }}" autocomplete="off">
          </td>
          <td class="actions action-stack">
            <button form="edit-chore-{{ chore.id }}" class="secondary" type="submit">Save</button>
            <form action="/chores/{{ chore.id }}/remove" method="post">
              <button class="secondary" type="submit">Remove</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4" class="empty">No chores yet.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
